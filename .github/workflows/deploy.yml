name: Deploy Organization README to Pages

on:
  push:
    branches: ["main"]
  # Allows manual triggering of the workflow
  workflow_dispatch:
  # Automatically syncs the content once a day
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site Repo
        uses: actions/checkout@v5

      - name: Fetch Organization README
        run: |
          # Download the raw version of the organization profile README
          curl -L https://raw.githubusercontent.com/Cyber-Threat-Hunting-Playground/.github/main/profile/README.md -o index.md
          
          # Optional: Add Jekyll Front Matter to ensure proper rendering
          sed -i '1i ---\nlayout: default\ntitle: Home\n---\n' index.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
